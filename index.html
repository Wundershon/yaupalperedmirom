<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой профиль</title>
  
  <link href="https://fonts.cdnfonts.com/css/faustina" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/open-sans" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="audio-box">
    <div class="audio-content">
      <span class="audio-title">♪ Музыка</span>
      <select id="track-select">
        <option value="">Выберите трек...</option>
        <option value="track1">Трек 1</option>
        <option value="track2">Трек 2</option>
      </select>
      <div class="audio-controls">
        <button id="play-btn" disabled>▶</button>
        <button id="mute-btn">🔊</button>
      </div>
      <input type="range" id="volume-slider" min="0" max="100" value="50">
      <audio id="audio-player"></audio>
    </div>
  </div>

  <div class="info-box">
    <div class="col" id="col">
      <img src="https://i.pinimg.com/736x/ae/68/54/ae6854765bff999fcdb1b8fe3113107b.jpg" class="main-img" alt="Avatar">
      <div class="profile-info">
        <p><b>Имя:</b> Лулу/Олег-Панацея</p>
        <p><b>Возраст:</b> 14.5</p>
        <p><b>Раса:</b> Тролль</p>
        <p><b>Гендер:</b> Мужской</p>
        <p><b>Ориентация:</b> Бисексуал</p>
      </div>
      <img src="https://i.pinimg.com/originals/fe/e3/f1/fee3f12758f782be4a589572b43b82cd.gif" class="static-gif" alt="GIF">
    </div>

    <div class="col">
      <div class="text-content">
        <blockquote>
          А у меня даже вчера такое было...<br>
          Бывает вот не спишь пару ночей...
        </blockquote>
        <p>Ты никому не нужен больше...</p>
      </div>
    </div>
  </div>

  <div class="ooc-box">
    <p><b>Заметка:</b> Нет смысла в серой рутине без музы...</p>
  </div>

  <script>
    // Минималистичный скрипт для плеера
    const player = document.getElementById('audio-player');
    const select = document.getElementById('track-select');
    const playBtn = document.getElementById('play-btn');

    select.addEventListener('change', () => {
      if (select.value) {
        player.src = select.value + '.mp3'; // Путь к файлу
        playBtn.disabled = false;
      }
    });

    playBtn.addEventListener('click', () => {
      player.paused ? player.play() : player.pause();
      playBtn.textContent = player.paused ? '▶' : '⏸';
    });
  </script>
</body>
</html>
